name: Ermete OS Chimera Kernel Build
on:
  push:
    branches: [ "chimera-main", "main" ]
  workflow_dispatch:

jobs:
  build-rpm:
    name: Build Chimera Kernel RPM
    runs-on: self-hosted
    container: fedora:latest
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      
    - name: Setup RPM Build Environment
      run: |
          dnf update -y
          dnf install -y rpm-build rpmdevtools clang lld llvm make cmake bison flex elfutils-libelf-devel openssl-devel ncurses-devel rsync tar bc cpio python3 zstd jq curl git ccache
          
          # Creazione utente isolato per rpmbuild
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
          
    - name: Cache Compiler (ccache)
      uses: actions/cache@v4
      with:
        path: /home/builder/.ccache
        key: ccache-kernel-chimera-${{ github.run_id }}
        restore-keys: |
          ccache-kernel-chimera-
          
    - name: Build RPM Packages via build-kernel-rpm.sh
      run: |
          export CC="ccache clang"
          export CXX="ccache clang++"
          sudo -H -E -u builder bash -c "export CC='ccache clang' && export CXX='ccache clang++' && ./build-kernel-rpm.sh"
          
    - name: Upload Binary RPMs
      uses: actions/upload-artifact@v4
      with:
        name: ermete-chimera-kernel-rpms
        path: /home/builder/rpmbuild/RPMS/x86_64/*.rpm
        
    - name: Upload Source RPM
      uses: actions/upload-artifact@v4
      with:
        name: ermete-chimera-kernel-srpm
        path: /home/builder/rpmbuild/SRPMS/*.src.rpm
