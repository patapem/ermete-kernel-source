name: Ermete OS Chimera Kernel Build
on:
  push:
    branches: [ "chimera-kernel-base", "main" ]
  workflow_dispatch:

jobs:
  build-rpm:
    name: Build Chimera Kernel RPM
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      
    - name: Setup RPM Build Environment
      run: |
          dnf update -y
          dnf install -y rpm-build rpmdevtools clang lld llvm make cmake bison flex elfutils-libelf-devel openssl-devel ncurses-devel rsync tar bc cpio python3 zstd jq curl git
          
          # Creazione utente isolato per rpmbuild
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder .
          
    - name: Build RPM Packages via build-kernel-rpm.sh
      run: |
          sudo -H -E -u builder bash -c "./build-kernel-rpm.sh"
          
    - name: Upload Binary RPMs
      uses: actions/upload-artifact@v4
      with:
        name: ermete-chimera-kernel-rpms
        path: /home/builder/rpmbuild/RPMS/x86_64/*.rpm
        
    - name: Upload Source RPM
      uses: actions/upload-artifact@v4
      with:
        name: ermete-chimera-kernel-srpm
        path: /home/builder/rpmbuild/SRPMS/*.src.rpm
