# ===================================================================
# ERMETE OS CHIMERA KERNEL - BEDROCK CONFIGURATION OVERRIDES
# ===================================================================

# --- Compiler & Performance Tuning ---
CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3=y
# CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE is not set
CONFIG_LTO_CLANG_THIN=y
CONFIG_LTO_CLANG=y
CONFIG_LTO=y
CONFIG_THINLTO=y
CONFIG_AUTOFDO_CLANG=y

# --- Scheduler & Latency (BORE + 1000Hz + Full Preempt) ---
CONFIG_SCHED_BORE=y
CONFIG_HZ_1000=y
CONFIG_HZ=1000
# CONFIG_HZ_300 is not set
# CONFIG_HZ_250 is not set
# CONFIG_HZ_100 is not set
CONFIG_PREEMPT=y
CONFIG_PREEMPT_BUILD=y
# CONFIG_PREEMPT_VOLUNTARY is not set
# CONFIG_PREEMPT_NONE is not set

# --- Network (BBRv3) ---
CONFIG_DEFAULT_BBR=y
CONFIG_TCP_CONG_BBR=y
# CONFIG_DEFAULT_CUBIC is not set

# --- Gaming & System Calls (NTSync) ---
CONFIG_NTSYNC=y

# --- Ultra Kernel Samepage Merging (UKSM) ---
CONFIG_UKSM=y
CONFIG_KSM=y

# --- Random Number Generator (LRNG) ---
CONFIG_LRNG=y
CONFIG_LRNG_DRNG_ATOMIC=y
CONFIG_LRNG_SWITCH=y

# --- 1GB HugePages Enabled for KVM / AI ---
CONFIG_HUGETLBFS=y
CONFIG_HUGETLB_PAGE=y
CONFIG_X86_DIRECT_GBPAGES=y
CONFIG_TRANSPARENT_HUGEPAGE=y
CONFIG_TRANSPARENT_HUGEPAGE_ALWAYS=y
CONFIG_LRU_GEN=y
CONFIG_LRU_GEN_ENABLED=y

# --- Mitigations Off (Disable Spectre / Meltdown for maximum performance) ---
# CONFIG_CPU_MITIGATIONS is not set
# CONFIG_PAGE_TABLE_ISOLATION is not set
# CONFIG_RETPOLINE is not set
CONFIG_CMDLINE_BOOL=y
CONFIG_CMDLINE="mitigations=off"

# --- Fedora OSTree & SELinux Hooks ---
CONFIG_SECURITY_SELINUX=y
CONFIG_SECURITY_SELINUX_BOOTPARAM=y
CONFIG_SECURITY_SELINUX_DEVELOP=y
CONFIG_DEFAULT_SECURITY_SELINUX=y
CONFIG_OVERLAY_FS=y
CONFIG_BLK_DEV_DM=y
CONFIG_DM_THIN_PROVISIONING=y
CONFIG_SQUASHFS=y
CONFIG_EROFS_FS=y

# --- Debloat & Build Speedups ---
CONFIG_WERROR=n
CONFIG_STACK_VALIDATION=n
CONFIG_OBJTOOL=n
CONFIG_DEBUG_INFO_NONE=y
CONFIG_MODULE_COMPRESS_ZSTD=y
